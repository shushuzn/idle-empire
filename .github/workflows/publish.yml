name: Publish to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: npm ci && npm run build

      - name: Create HTML wrapper
        run: |
          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Idle Empire</title>
            <link rel="stylesheet" href="assets/style.css" />
          </head>
          <body>
            <div id="app"></div>
            <script src="assets/game.js"></script>
          </body>
          </html>
          HTMLEOF

      - name: Upload to itch.io via API
        run: |
          DIST_DIR="dist"
          GAME="shushuzn/idle-empire-premium-idle-game"
          API_KEY="${{ secrets.ITCH_API_KEY }}"

          echo "Fetching game record..."
          GAME_RESP=$(curl -s -w "\n%{http_code}" "https://itch.io/api/1/games/${GAME}")
          HTTP_CODE=$(echo "$GAME_RESP" | tail -1)
          BODY=$(echo "$GAME_RESP" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to fetch game: HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          GAME_ID=$(echo "$BODY" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          echo "Game ID: $GAME_ID"

          if [ -z "$GAME_ID" ]; then
            echo "Could not parse game ID from response"
            echo "$BODY"
            exit 1
          fi

          echo "Fetching upload URL..."
          UPLOAD_RESP=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer $API_KEY" "https://itch.io/api/1/games/${GAME_ID}/edit")
          HTTP_CODE=$(echo "$UPLOAD_RESP" | tail -1)

          echo "Upload endpoint response: HTTP $HTTP_CODE"

          echo "Uploading files..."
          for file in "$DIST_DIR"/*; do
            if [ -f "$file" ]; then
              FNAME=$(basename "$file")
              echo "Uploading $FNAME..."
              UPLOAD=$(curl -s -w "\n%{http_code}" -X POST \
                -H "Authorization: Bearer $API_KEY" \
                -H "Accept: application/json" \
                "https://itch.io/api/1/games/${GAME_ID}/uploads")
              HTTP_CODE=$(echo "$UPLOAD" | tail -1)
              echo "Upload response for $FNAME: HTTP $HTTP_CODE"
              echo "$UPLOAD" | sed '$d' | head -c 200
              echo
            fi
          done

          echo "Done!"
