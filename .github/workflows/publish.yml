name: Publish to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: npm ci && npm run build

      - name: Create HTML wrapper
        run: |
          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Idle Empire</title>
            <link rel="stylesheet" href="assets/style.css" />
          </head>
          <body>
            <div id="app"></div>
            <script src="assets/game.js"></script>
          </body>
          </html>
          HTMLEOF

      - name: Install butler
        run: |
          curl -LsSf https://butler.itch.io/get --output butler
          chmod +x butler
        shell: bash

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: |
          ./butler push dist shushuzn/idle-empire-premium-idle-game:html
